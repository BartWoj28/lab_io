<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>VOD</title>
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
    <link href="https://fonts.googleapis.com/css?family=Orbitron" rel="stylesheet"/>
</head>
<body>
<header>
    <a href=""><h1>Pix</h1></a>
    <h2 th:text="${title}"></h2>
    <h3>
    </h3>
</header>
<section>

    <table>
        <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Producer</th>
            <th>Price</th>
            <th>Stores</th>
        </tr>
        <tr th:each="p : ${products}">
            <td>
                <img th:src="${p.photo}"/>
            </td>
            <td th:text="${p.name}"></td>
            <td>
                <a th:href="@{/products?producerId={id}(id=${p.producer.id})}"
                   th:text="${p.producer.name} + ' ' + ${p.producer.country}"></a>
            </td>
            <td class="price" th:text="${p.price}"></td>
            <td class="search-container">
                <a class="search" th:href="@{/stores?productId={id}(id=${p.id})}"></a>
            </td>
        </tr>
    </table>

</section>
<div id="orders">
</div>
<footer>
    ${tip}
</footer>

</body>
</html>
